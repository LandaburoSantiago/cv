<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">SML favicon</title>
  <desc id="desc">Favicon with the letters SML using the current portfolio color palette.</desc>
  <rect width="64" height="64" rx="16" fill="#334155"/>
  <text
    x="50%"
    y="53%"
    fill="#f7f3ee"
    font-family="Sora, Manrope, Arial, sans-serif"
    font-size="20"
    font-weight="800"
    letter-spacing="-1.1"
    text-anchor="middle"
    dominant-baseline="central"
  >
    <tspan>S</tspan><tspan fill="#cf6f4b">M</tspan><tspan>L</tspan>
  </text>
</svg>
